# @package _global_
# =============================================================================
# Bandit (NTS) Experiment Configuration
# =============================================================================
# Usage: python3 -m scripts.experiments.run_real_nts_experiment --

defaults:
  - _self_

experiment:
  dataset: adult
  seed: 42
  feature_mode: embeddings

training:
  embedding_dim: 64
  hidden_dim: 128
  encoder_epochs: 20
  lr: 1.0e-3
  weight_decay: 1.0e-5
  batch_size: 256

bandit:
  n_rounds: 10000
  n_encoder_seeds: 3
  n_bandit_seeds: 3
  n_arms: 5
  n_optuna_trials: 20
  fixed_nu: null
  fixed_lambda: null
  families_to_run: null

rq:
  n_levels: 8
  nbits: 6
  d_cut: 2
  auto_dcut: true
  km_clusters: null

output:
  manifold_bucket: fi_platform_ml_infra_fluent2_bucket
  manifold_prefix: tree/fi_trunk_tail/bandit

tb_logger:
  _target_: hydra.utils.instantiate
  _recursive_: false
  config:
    _target_: torchtnt.utils.loggers.meta.tensorboard.TensorBoardLogger
    path:
      _target_: pathlib.Path
      bucket: ${output.manifold_bucket}
      suffix: tb_fi_trunk_tail_bandit

runner:
  _target_: runner.hf.BanditRunner
  dataset: ${experiment.dataset}
  seed: ${experiment.seed}
  n_rounds: ${bandit.n_rounds}
  n_encoder_seeds: ${bandit.n_encoder_seeds}
  n_bandit_seeds: ${bandit.n_bandit_seeds}
  n_arms: ${bandit.n_arms}
  n_optuna_trials: ${bandit.n_optuna_trials}
  fixed_nu: ${bandit.fixed_nu}
  fixed_lambda: ${bandit.fixed_lambda}
  families_to_run: ${bandit.families_to_run}
  embedding_dim: ${training.embedding_dim}
  hidden_dim: ${training.hidden_dim}
  encoder_epochs: ${training.encoder_epochs}
  lr: ${training.lr}
  weight_decay: ${training.weight_decay}
  batch_size: ${training.batch_size}
  n_levels: ${rq.n_levels}
  nbits: ${rq.nbits}
  d_cut: ${rq.d_cut}
  auto_dcut: ${rq.auto_dcut}
  km_clusters: ${rq.km_clusters}
  manifold_bucket: ${output.manifold_bucket}
  manifold_prefix: ${output.manifold_prefix}
  feature_mode: ${experiment.feature_mode}
  tb_logger: ${tb_logger}

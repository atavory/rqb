# @package _global_
# =============================================================================
# Contrastive Learning Experiment Configuration
# =============================================================================
# Usage: python3 -m scripts.experiments.run_real_nts_experiment --

defaults:
  - _self_

experiment:
  dataset: adult
  seed: 42
  method: m-RQ
  feature_mode: embeddings

training:
  encoder_epochs: 20
  contrastive_epochs: 50
  lr: 1.0e-3
  weight_decay: 1.0e-5
  batch_size: 256
  temperature: 0.07
  embedding_dim: 64
  hidden_dim: 128
  projection_dim: 32
  view_refresh_interval: 25
  mrq_noise_scale: 0.1

rq:
  n_levels: 8
  nbits: 6
  d_cut: 4
  beam_size: 5
  auto_d_cut: false

supervised:
  prototype_weight: 0.5
  hard_neg_strength: 0.5

output:
  manifold_bucket: fi_platform_ml_infra_fluent2_bucket
  manifold_prefix: tree/fi_trunk_tail/contrastive

tb_logger:
  _target_: hydra.utils.instantiate
  _recursive_: false
  config:
    _target_: torchtnt.utils.loggers.meta.tensorboard.TensorBoardLogger
    path:
      _target_: pathlib.Path
      bucket: ${output.manifold_bucket}
      suffix: tb_fi_trunk_tail_contrastive

runner:
  _target_: runner.hf.ContrastiveRunner
  dataset: ${experiment.dataset}
  seed: ${experiment.seed}
  method: ${experiment.method}
  encoder_epochs: ${training.encoder_epochs}
  contrastive_epochs: ${training.contrastive_epochs}
  lr: ${training.lr}
  weight_decay: ${training.weight_decay}
  batch_size: ${training.batch_size}
  temperature: ${training.temperature}
  embedding_dim: ${training.embedding_dim}
  hidden_dim: ${training.hidden_dim}
  projection_dim: ${training.projection_dim}
  view_refresh_interval: ${training.view_refresh_interval}
  mrq_noise_scale: ${training.mrq_noise_scale}
  n_levels: ${rq.n_levels}
  nbits: ${rq.nbits}
  d_cut: ${rq.d_cut}
  beam_size: ${rq.beam_size}
  auto_d_cut: ${rq.auto_d_cut}
  prototype_weight: ${supervised.prototype_weight}
  hard_neg_strength: ${supervised.hard_neg_strength}
  manifold_bucket: ${output.manifold_bucket}
  manifold_prefix: ${output.manifold_prefix}
  feature_mode: ${experiment.feature_mode}
  tb_logger: ${tb_logger}
